<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜頂Trip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="top"></div>
<!-- ロゴ -->
<a href="index.html#top" class="logo" id="logo">
  <img src="images/logo.png" alt="Trip ロゴ">
</a>
<nav class="menu" id="menu">
  <a href="index.html#service">サービス内容</a>
  <a href="index.html#price">料金</a>
  <a href="index.html#video">動画</a>
  <a href="contact.html">お問い合わせ</a>
</nav>
<!-- 言語 -->
<div class="lang">
  <a href="index-en.html" class="lang-btn">EN</a>
  <button class="menu-btn" id="menuBtn">☰</button>
</div>


<div class="container">

<h1>お問い合わせ</h1>
<p>
サービスのご相談・ご質問は、以下のフォームよりお気軽にお問い合わせください。
</p>

<div class="box">
<form
  action="https://docs.google.com/forms/d/e/1FAIpQLSftIrsQAOJJx85EqeqUuUz40bjE1-yxP0xMGcdL7kHML73fpw/formResponse"
  method="POST"
  onsubmit="setTimeout(()=>{location.href='thanks.html'},300)"
>

<label>施設名</label><br>
<input type="text" name="entry.1442166859"><br><br>

<label>お名前 *</label><br>
<input type="text" name="entry.1801106815" required><br><br>

<label>メールアドレス *</label><br>
<input type="email" name="entry.878591752" required><br><br>

<label>お問い合わせ内容 *</label><br>
<textarea name="entry.88568262" rows="6" required></textarea><br><br>

<button type="submit" class="cta-btn">送信する</button>

</form>
</div>

<footer>
© 2026 頂Trip Inbound Support
</footer>

</div>
<script>
const logo = document.getElementById("logo");
const menuBtn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

/* ロゴ縮小 */
window.addEventListener("scroll",()=>{
  if(window.scrollY>120){
    logo.classList.add("small");
  }else{
    logo.classList.remove("small");
  }
});

/* メニュー開閉 */
menuBtn.addEventListener("click",()=>{
  menu.style.display = menu.style.display==="block" ? "none" : "block";
});

/* スムーススクロール */

document.querySelectorAll('.menu a').forEach(link=>{
  link.addEventListener('click',e=>{
    const href = link.getAttribute('href');

    // ページ内リンクだけスムーススクロール
    if(href.startsWith("#")){
      e.preventDefault();
      const target = document.querySelector(href);
      if(target){
        target.scrollIntoView({behavior:'smooth'});
      }
      menu.style.display="none";
    }
    // 他ページリンクはそのまま遷移（何もしない）
  });
});
</script>
</body>
</html>
